version: 2
updates:
  # Scan GitHub Actions dependencies
  # Enabled Require actions to be pinned to a full-length commit SHA
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Options: daily, weekly, monthly
    groups:
      # Optional: Group updates together to minimize PR noise
      action-updates:
        patterns:
          - "*"
