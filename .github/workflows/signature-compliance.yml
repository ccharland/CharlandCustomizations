name: Signature Compliance - Scripts

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Scripts/**/*.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-signatures:
    name: Validate Authenticode Signatures (Scripts)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run signature compliance gate
        shell: pwsh
        run: ./Scripts/Test-SignatureCompliance.ps1 -Path './Scripts'
