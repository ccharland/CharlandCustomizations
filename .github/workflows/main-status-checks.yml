# Runs the same quality checks on every push to main so the merge commit
# has passing status checks. This satisfies the tag ruleset requirement that
# the tagged commit has all required checks green before a release tag is accepted.
#
# Generated by Kiro using Auto, reviewed by ccharland

name: Main Branch Status Checks

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pester-tests:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install AWS.Tools modules
        shell: pwsh
        run: |
          Install-Module -Name AWS.Tools.Installer -Scope CurrentUser -Force
          Install-AWSToolsModule -Name @(
            'AWS.Tools.Common',
            'AWS.Tools.AutoScaling',
            'AWS.Tools.CertificateManager',
            'AWS.Tools.CloudFormation',
            'AWS.Tools.CloudFront',
            'AWS.Tools.CloudWatch',
            'AWS.Tools.CodeBuild',
            'AWS.Tools.DAX',
            'AWS.Tools.DirectoryService',
            'AWS.Tools.DirectoryServiceData',
            'AWS.Tools.DocDB',
            'AWS.Tools.DynamoDBv2',
            'AWS.Tools.EC2',
            'AWS.Tools.ECS',
            'AWS.Tools.EKS',
            'AWS.Tools.ElastiCache',
            'AWS.Tools.ElasticFileSystem',
            'AWS.Tools.ElasticLoadBalancing',
            'AWS.Tools.ElasticLoadBalancingV2',
            'AWS.Tools.ElasticMapReduce',
            'AWS.Tools.ForecastService',
            'AWS.Tools.FSx',
            'AWS.Tools.Glue',
            'AWS.Tools.IdentityManagement',
            'AWS.Tools.Kafka',
            'AWS.Tools.KeyManagementService',
            'AWS.Tools.Lambda',
            'AWS.Tools.MQ',
            'AWS.Tools.Neptune',
            'AWS.Tools.OpenSearchService',
            'AWS.Tools.RDS',
            'AWS.Tools.Redshift',
            'AWS.Tools.S3',
            'AWS.Tools.SageMaker',
            'AWS.Tools.SecretsManager',
            'AWS.Tools.SecurityToken',
            'AWS.Tools.SimpleNotificationService',
            'AWS.Tools.SimpleSystemsManagement',
            'AWS.Tools.SQS',
            'AWS.Tools.SSO',
            'AWS.Tools.SSOOIDC',
            'AWS.Tools.StepFunctions',
            'AWS.Tools.StorageGateway',
            'AWS.Tools.Transfer',
            'AWS.Tools.WorkSpaces'
          ) -Scope CurrentUser -Force -CleanUp

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  code-quality:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run static analysis
        shell: pwsh
        run: ./Scripts/Test-CodeQuality.ps1

  help-validation:
    name: Comment-Based Help
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install AWS.Tools.Common
        shell: pwsh
        run: Install-Module -Name AWS.Tools.Common -Scope CurrentUser -Force

      - name: Run help compliance gate
        shell: pwsh
        run: ./Scripts/Test-HelpCompliance.ps1

  manifest-validation:
    name: Manifest Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run manifest compliance gate
        shell: pwsh
        run: ./Scripts/Test-ManifestCompliance.ps1
