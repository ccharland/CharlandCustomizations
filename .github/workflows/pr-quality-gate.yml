name: PR Quality Gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pester-tests:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install and import AWSPowerShell.NetCore
        shell: pwsh
        run: |
          Install-Module -Name AWSPowerShell.NetCore -Scope CurrentUser -Force
          Import-Module AWSPowerShell.NetCore -ErrorAction Stop
          Write-Output "AWSPowerShell.NetCore $(Get-Module AWSPowerShell.NetCore | Select-Object -ExpandProperty Version) loaded"

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './testResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./testResults.xml

  code-quality:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Verify Test-CodeQuality.ps1 signature
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature -FilePath './Scripts/Test-CodeQuality.ps1'
          if ($sig.Status -ne 'Valid') {
              throw "Test-CodeQuality.ps1 signature status: $($sig.Status). Script must be Authenticode-signed."
          }
          Write-Host "Signature valid: $($sig.SignerCertificate.Subject)"

      - name: Run static analysis
        shell: pwsh
        run: ./Scripts/Test-CodeQuality.ps1

  help-validation:
    name: Comment-Based Help
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install and import AWS.Tools.Common
        shell: pwsh
        run: |
          Install-Module -Name AWS.Tools.Common -Scope CurrentUser -Force -AllowClobber
          Import-Module AWS.Tools.Common -ErrorAction Stop
      - name: Verify Test-HelpCompliance.ps1 signature
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature -FilePath './Scripts/Test-HelpCompliance.ps1'
          if ($sig.Status -ne 'Valid') {
              throw "Test-HelpCompliance.ps1 signature status: $($sig.Status). Script must be Authenticode-signed."
          }
          Write-Host "Signature valid: $($sig.SignerCertificate.Subject)"

      - name: Run help compliance gate
        shell: pwsh
        run: ./Scripts/Test-HelpCompliance.ps1

  manifest-validation:
    name: Manifest Compliance
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify Test-ManifestCompliance.ps1 signature
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature -FilePath './Scripts/Test-ManifestCompliance.ps1'
          if ($sig.Status -ne 'Valid') {
              throw "Test-ManifestCompliance.ps1 signature status: $($sig.Status). Script must be Authenticode-signed."
          }
          Write-Host "Signature valid: $($sig.SignerCertificate.Subject)"

      - name: Run manifest compliance gate
        shell: pwsh
        run: ./Scripts/Test-ManifestCompliance.ps1
