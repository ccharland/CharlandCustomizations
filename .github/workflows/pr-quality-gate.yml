name: PR Quality Gate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pester-tests:
    name: Pester Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install and import AWSPowerShell.NetCore
        shell: pwsh
        run: |
          Install-Module -Name AWSPowerShell.NetCore -Scope CurrentUser -Force
          Import-Module AWSPowerShell.NetCore -ErrorAction Stop
          Write-Output "AWSPowerShell.NetCore $(Get-Module AWSPowerShell.NetCore | Select-Object -ExpandProperty Version) loaded"

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './testResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./testResults.xml

  code-quality:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run static analysis
        shell: pwsh
        run: ./Scripts/Test-CodeQuality.ps1

  help-validation:
    name: Comment-Based Help
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install AWS.Tools.Common
        shell: pwsh
        run: Install-Module -Name AWS.Tools.Common -Scope CurrentUser -Force

      - name: Run help compliance gate
        shell: pwsh
        run: ./Scripts/Test-HelpCompliance.ps1

  manifest-validation:
    name: Manifest Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run manifest compliance gate
        shell: pwsh
        run: ./Scripts/Test-ManifestCompliance.ps1
