# Auto-tag when a publish/* branch merges to main.
# Reads the module version from the manifest and creates a v-prefixed tag,
# which triggers the existing publish.yml workflow.
#
# Triggered after Main Branch Status Checks complete successfully, ensuring
# the tag ruleset requirement (all required checks green) is satisfied before
# the tag push is attempted.

name: Auto-Tag on Publish Merge

on:
  workflow_run:
    workflows: ["Main Branch Status Checks"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without pushing the tag (test mode)'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: read
jobs:
  tag-publish-merge:
    name: Tag publish/* merge (skips other merges)
    # Only run when: (a) workflow_dispatch (manual/dry-run), or
    # (b) the triggering workflow_run succeeded from a push event.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest

    steps:
      - name: Check if merge came from a publish branch
        id: check-publish
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            // For manual dispatch, proceed only in dry-run mode to avoid bypassing publish/* gating
            if (context.eventName === 'workflow_dispatch') {
              const dryRun = String(context.payload.inputs?.dry_run ?? 'true') === 'true';
              if (!dryRun) {
                core.setFailed('Refusing to push tags from workflow_dispatch; use dry_run=true or trigger via a merged publish/* PR.');
                return;
              }
              core.setOutput('is_publish', 'true');
              core.setOutput('merge_sha', context.sha);
              core.info(`Manual dispatch (dry-run): using HEAD sha ${context.sha}`);
              return;
            }

            // For workflow_run: find PRs merged at this commit
            const sha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const publishPR = prs.find(pr => pr.merged_at && pr.head.ref.startsWith('publish/') && pr.merge_commit_sha === sha);
            if (publishPR) {
              core.setOutput('is_publish', 'true');
              core.setOutput('merge_sha', sha);
              core.info(`Found merged publish PR #${publishPR.number} from branch ${publishPR.head.ref}`);
            } else {
              core.setOutput('is_publish', 'false');
              core.info('No merged publish/* PR found for this commit. Skipping.');
            }

      - name: Checkout main at merge commit
        if: steps.check-publish.outputs.is_publish == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ steps.check-publish.outputs.merge_sha }}

      - name: Read version from manifest
        if: steps.check-publish.outputs.is_publish == 'true'
        id: version
        shell: pwsh
        run: |
          $manifestPath = './src/CharlandCustomizations/CharlandCustomizations.psd1'

          if (-not (Test-Path $manifestPath)) {
              Write-Error "Manifest not found at $manifestPath. Cannot determine version for tagging."
              exit 1
          }

          try {
              $manifest = Import-PowerShellDataFile -Path $manifestPath -ErrorAction Stop
          }
          catch {
              Write-Error "Failed to parse manifest at ${manifestPath}: $_"
              exit 1
          }

          $version = $manifest.ModuleVersion
          if (-not $version) {
              Write-Error "ModuleVersion is missing or empty in $manifestPath."
              exit 1
          }

          $prerelease = $manifest.PrivateData.PSData.Prerelease

          if ($prerelease) {
              $tag = "v$version-$prerelease"
          } else {
              $tag = "v$version"
          }

          Write-Host "Resolved tag: $tag"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Verify tag does not already exist
        if: steps.check-publish.outputs.is_publish == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "::error::Tag $TAG already exists. Aborting."
            exit 1
          fi
          echo "Tag $TAG is available."

      - name: Verify changelog has entry for this version
        if: steps.check-publish.outputs.is_publish == 'true'
        shell: pwsh
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $version = $env:TAG -replace '^v', ''
          $changelog = Get-Content './docs/CHANGELOG.md' -Raw

          # Match a heading like ## [0.5.0] or ## [0.5.0-beta1]
          $pattern = "## \[$([regex]::Escape($version))\]"

          if ($changelog -notmatch $pattern) {
              Write-Error "Changelog does not contain a section for version $version. Add a '## [$version]' entry to docs/CHANGELOG.md before publishing."
              exit 1
          }

          Write-Host "Changelog entry found for version $version."

      - name: Import release tag signing key
        if: steps.check-publish.outputs.is_publish == 'true'
        env:
          # Repository secrets must contain the armored private key and optional passphrase
          # for a GitHub-verified GPG key that is allowed to create signed release tags.
          GPG_PRIVATE_KEY: ${{ secrets.TAG_SIGNING_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.TAG_SIGNING_GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::TAG_SIGNING_GPG_PRIVATE_KEY secret is not configured."
            exit 1
          fi

          export GNUPGHOME="$RUNNER_TEMP/release-tag-signing"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          if ! printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import; then
            echo "::error::Failed to import TAG_SIGNING_GPG_PRIVATE_KEY."
            exit 1
          fi

          GPG_KEY_ID=$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec:/ { print $5; exit }')
          if [ -z "$GPG_KEY_ID" ]; then
            echo "::error::No secret GPG key was imported for tag signing."
            exit 1
          fi

          printf '%s' "$GPG_PASSPHRASE" >"$RUNNER_TEMP/gpg-passphrase.txt"
          chmod 600 "$RUNNER_TEMP/gpg-passphrase.txt"

          cat >"$RUNNER_TEMP/gpg-loopback.sh" <<'EOF'
          #!/usr/bin/env bash
          exec gpg --batch --yes --pinentry-mode loopback --passphrase-file "$GPG_PASSPHRASE_FILE" "$@"
          EOF
          chmod 700 "$RUNNER_TEMP/gpg-loopback.sh"

          {
            echo "GNUPGHOME=$GNUPGHOME"
            echo "GPG_KEY_ID=$GPG_KEY_ID"
            echo "GPG_PASSPHRASE_FILE=$RUNNER_TEMP/gpg-passphrase.txt"
            echo "GPG_WRAPPER=$RUNNER_TEMP/gpg-loopback.sh"
          } >> "$GITHUB_ENV"

      - name: Create and push signed tag
        if: steps.check-publish.outputs.is_publish == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config gpg.program "$GPG_WRAPPER"
          git config gpg.format openpgp
          git config user.signingkey "$GPG_KEY_ID"

          git tag -s "$TAG" -m "Release $TAG"

          if [ "$DRY_RUN" = "true" ]; then
            echo "::warning::DRY RUN — would push tag $TAG but skipping."
            echo "::notice::Tag $TAG created locally (not pushed). Workflow validated successfully."
          else
            git push origin "refs/tags/$TAG"
            echo "::notice::Created signed tag $TAG — publish workflow will trigger."
          fi
